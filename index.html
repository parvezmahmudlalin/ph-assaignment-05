
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker | Login</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <!--tailwind + daisyUI-->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

     <!-- styles -->
    <link rel="stylesheet" href="./styles/style.css" />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
   
  </head>

  <body class="bg-base-200 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md bg-base-100 rounded-lg shadow-lg">
      <!-- Login heading -->
      <div class="text-center">
        <div class="logo w-[90px] pt-8 mx-auto mb-3">
          <img src="./assets/github-logo.png" alt="" />
        </div>
        <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
        <p class="text-gray-400">Sign in to manage your issues</p>
      </div>

      <!-- Login form -->
      <div class="form">
        <div class="card w-full mx-auto">
          <div class="card-body">
            <div>
              <label class="label text-neutral font-bold">Username</label>
              <input
                
                type="text"
                class="input rounded-md w-full"
                placeholder="Enter Username"
              />
              <p class="text-[#4A00FF]">Default: admin</p>
              <br />
              <label class="label text-neutral font-bold">Password</label>
              <input
                
                type="password"
                class="input rounded-md w-full"
                placeholder="Enter Password"
              />
              <p class="text-[#4A00FF]">Default: admin123</p>
              <br />
              <button
                
                class="btn btn-primary mt-1 rounded-md w-full"
              >
                Sign In
              </button>
            </div>
          </div>
        </div>
      </div>

    
      <div class="divider mx-6">
        <span>OR</span>
      </div>

      
      <div class="text-center space-y-1">
        <p class="text-gray-400">Demo Credentials:</p>
        <div class="bg-base-200 py-4 mx-6 mb-5 rounded-lg">
          <p>
            <span class="font-semibold">Username:</span> admin <br /><span
              class="font-semibold"
            >
              Password</span
            >: admin123
          </p>
        </div>
      </div>
    </div>

   
  </body>
</html>
